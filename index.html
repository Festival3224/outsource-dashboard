<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outsource Dashboard</title>
  <link rel="stylesheet" href="./css/style.css">
  <script type="module" src="./js/app.js"></script>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1>Dashboard</h1>

      <div class="sidebar-controls">
        <select id="month-select"></select>
        <select id="year-select"></select>
      </div>

      <nav class="nav">
        <button id="projects-tab" class="nav-button active">Projects</button>
        <button id="employees-tab" class="nav-button">Employees</button>
      </nav>

      <button id="seed-button" class="seed-button">Seed Data</button>
    </aside>

    <main class="main">
      <div id="content"></div>
    </main>
  </div>

  <!-- EMPLOYEE PANEL -->
  <div class="modal hidden" id="employee-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Add New Employee</h2>
      <button class="modal-close" id="employee-modal-close">×</button>
    </div>

    <form id="employee-form" class="form">
      <label>
        Name: *
        <input type="text" name="name" required>
        <span class="error-message" data-error="name"></span>
      </label>

      <label>
        Surname: *
        <input type="text" name="surname" required>
        <span class="error-message" data-error="surname"></span>
      </label>

      <label>
        Date of Birth: *
        <input type="date" name="dateOfBirth" required>
        <span class="error-message" data-error="dateOfBirth"></span>
      </label>

      <label>
        Position: *
        <select name="position" required>
          <option value="">Select position</option>
          <option value="Frontend Developer">Frontend Developer</option>
          <option value="Backend Developer">Backend Developer</option>
          <option value="Fullstack Developer">Fullstack Developer</option>
          <option value="Project Manager">Project Manager</option>
          <option value="Designer">Designer</option>
          <option value="QA Engineer">QA Engineer</option>
        </select>
        <span class="error-message" data-error="position"></span>
      </label>

      <label>
        Salary: *
        <input type="number" name="salary" min="0" step="0.01" required>
        <span class="error-message" data-error="salary"></span>
      </label>

      <div class="form-actions">
        <button type="button" class="secondary-button" id="employee-form-cancel">
          Cancel
        </button>
        <button type="submit" class="primary-button" id="employee-submit" disabled>
          Save
        </button>
      </div>
    </form>
  </div>
</div>

<!-- PROJECT PANEL -->
<div class="modal hidden" id="project-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Add New Project</h2>
      <button class="modal-close" id="project-modal-close">×</button>
    </div>

    <form id="project-form" class="form">
      <label>
        Project Name: *
        <input type="text" name="projectName" required>
        <span class="error-message" data-error="projectName"></span>
      </label>

      <label>
        Company Name: *
        <input type="text" name="companyName" required>
        <span class="error-message" data-error="companyName"></span>
      </label>

      <label>
        Budget: *
        <input type="number" name="budget" min="0" step="0.01" required>
        <span class="error-message" data-error="budget"></span>
      </label>

      <label>
        Employee Capacity: *
        <input type="number" name="capacity" min="1" step="1" required>
        <span class="error-message" data-error="capacity"></span>
      </label>

      <div class="form-actions">
        <button type="button" class="secondary-button" id="project-form-cancel">
          Cancel
        </button>
        <button type="submit" class="primary-button" id="project-submit" disabled>
          Save
        </button>
      </div>
    </form>
  </div>
</div>

<!-- PROJECT EMPLOYEES MODAL -->
<div class="center-modal hidden" id="project-employees-modal">
  <div class="center-modal-content">
    <div class="center-modal-header">
      <h2 id="project-employees-title">Employees on Project</h2>
      <button class="modal-close" id="project-employees-close">×</button>
    </div>

    <div id="project-employees-body"></div>
  </div>
</div>


<!-- EMPLOYEE ASSIGNMENTS MODAL -->
<div class="center-modal hidden" id="employee-assignments-modal">
  <div class="center-modal-content">
    <div class="center-modal-header">
      <h2 id="employee-assignments-title">Employee Assignments</h2>
      <button class="modal-close" id="employee-assignments-close">×</button>
    </div>

    <div id="employee-assignments-body"></div>
  </div>
</div>

<!-- EMPLOYEE AVAILABILITY MODAL -->
<div class="center-modal hidden" id="employee-availability-modal">
  <div class="center-modal-content">
    <div class="center-modal-header">
      <h2 id="employee-availability-title">Employee Availability</h2>
      <button class="modal-close" id="employee-availability-close">×</button>
    </div>

    <div id="employee-availability-body"></div>
  </div>
</div>

 <!-- ASSIGN  -->
<div class="assign-popup hidden" id="assign-popup">
  <div class="assign-popup-header">
    <h2 id="assign-popup-title">Assign Employee</h2>
  </div>

  <div class="assign-popup-info" id="assign-popup-info"></div>

  <form id="assign-form" class="form">
    <label>
      Select Project:
      <select name="projectId" id="assign-project-select" required></select>
    </label>

    <label>
      Capacity:
      <input
        type="number"
        name="capacity"
        id="assign-capacity"
        min="0.1"
        max="1.5"
        step="0.1"
        value="1"
        required
      >
    </label>

    <label>
      Fit:
      <input
        type="number"
        name="fit"
        id="assign-fit"
        min="0"
        max="1"
        step="0.1"
        value="1"
        required
      >
    </label>

    <p class="error-message" id="assign-error"></p>

    <div class="form-actions">
      <button type="submit" class="primary-button" id="assign-submit" disabled>
        Assign
      </button>
      <button type="button" class="secondary-button" id="assign-cancel">
        Cancel
      </button>
    </div>
  </form>
</div>

<!-- EDIT ASSIGNMENT -->
<div class="assign-popup hidden" id="edit-assignment-popup">
  <div class="assign-popup-header">
    <h2 id="edit-assignment-title">Edit Assignment</h2>
  </div>

  <div class="assign-popup-info" id="edit-assignment-info"></div>

  <form id="edit-assignment-form" class="form">
    <label>
      Capacity:
      <input
        type="number"
        name="capacity"
        min="0.1"
        max="1.5"
        step="0.1"
        required
      >
    </label>

    <label>
      Fit:
      <input
        type="number"
        name="fit"
        min="0"
        max="1"
        step="0.1"
        required
      >
    </label>

    <div class="form-actions">
      <button type="submit" class="primary-button" id="edit-assignment-submit">
        Save
      </button>
      <button type="button" class="secondary-button" id="edit-assignment-cancel">
        Cancel
      </button>
    </div>
  </form>
</div>

</body>
</html>
