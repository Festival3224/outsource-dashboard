<!DOCTYPE html>
<html lang="en">
<head>

  <title>Outsource Dashboard</title>
  <link rel="stylesheet" href="./css/style.css">
  <script type="module" src="./js/app.js"></script>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1>Dashboard</h1>

      <div class="sidebar-controls">

    <main class="main">
      <div id="content"></div>

  </div>

</html>
