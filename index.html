<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outsource Dashboard</title>
  <link rel="stylesheet" href="./css/style.css">
  <script type="module" src="./js/app.js"></script>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1>Dashboard</h1>

      <div class="sidebar-controls">
        <select id="month-select"></select>
        <select id="year-select"></select>
      </div>

      <nav class="nav">
        <button id="projects-tab" class="nav-button active">Projects</button>
        <button id="employees-tab" class="nav-button">Employees</button>
      </nav>

      <button id="seed-button" class="seed-button">Seed Data</button>
    </aside>

    <main class="main">
      <div id="content"></div>
    </main>
  </div>

  <!-- MODAL -->
  <div class="modal hidden" id="employee-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Add New Employee</h2>
      <button class="modal-close" id="employee-modal-close">×</button>
    </div>

    <form id="employee-form" class="form">
      <label>
        Name: *
        <input type="text" name="name" required>
        <span class="error-message" data-error="name"></span>
      </label>

      <label>
        Surname: *
        <input type="text" name="surname" required>
        <span class="error-message" data-error="surname"></span>
      </label>

      <label>
        Date of Birth: *
        <input type="date" name="dateOfBirth" required>
        <span class="error-message" data-error="dateOfBirth"></span>
      </label>

      <label>
        Position: *
        <select name="position" required>
          <option value="">Select position</option>
          <option value="Frontend Developer">Frontend Developer</option>
          <option value="Backend Developer">Backend Developer</option>
          <option value="Fullstack Developer">Fullstack Developer</option>
          <option value="Project Manager">Project Manager</option>
          <option value="Designer">Designer</option>
          <option value="QA Engineer">QA Engineer</option>
        </select>
        <span class="error-message" data-error="position"></span>
      </label>

      <label>
        Salary: *
        <input type="number" name="salary" min="0" step="0.01" required>
        <span class="error-message" data-error="salary"></span>
      </label>

      <div class="form-actions">
        <button type="button" class="secondary-button" id="employee-form-cancel">
          Cancel
        </button>
        <button type="submit" class="primary-button" id="employee-submit" disabled>
          Save
        </button>
      </div>
    </form>
  </div>
</div>

</body>
</html>
